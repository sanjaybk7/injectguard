name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest --cov=injectguard --cov-report=term-missing

  self-scan:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Scan our own fixtures (must find issues)
        run: |
          set +e
          injectguard scan tests/fixtures/vulnerable --include-tests --format json -o findings.json
          rc=$?
          set -e
          # We expect a non-zero exit because the vulnerable fixtures should fire IG001/IG002.
          if [ "$rc" -eq 0 ]; then
            echo "::error::self-scan failed: scanner did not flag known-vulnerable fixtures"
            exit 1
          fi
          echo "OK — scanner flagged vulnerable fixtures (exit $rc)"
          cat findings.json
